<!DOCTYPE html>
<html>
<head>
    <title>HTML List Example</title>
</head>
<body>

    <h1>HTML List Tags Demo</h1>

    <!-- 1. Unordered List -->
    <h2>Unordered List (Bullets)</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>

    <!-- 2. Ordered List -->
    <h2>Ordered List (Numbers)</h2>
    <ol>
        <li>Wake up</li>
        <li>Study</li>
        <li>Sleep</li>
    </ol>

    <!-- 3. Ordered List with Type -->
    <h2>Ordered List with Type</h2>
    <ol type="A">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <!-- 4. Description List -->
    <h2>Description List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Used to create structure of web pages</dd>

        <dt>CSS</dt>
        <dd>Used to style web pages</dd>
    </dl>

</body>
</html>
