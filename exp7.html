<!DOCTYPE html>
<html>
<head>
    <title>Link Tag Demo</title>
</head>
<body>

    <h1>HTML Link Tag Examples</h1>

    <!-- 1. Basic Link -->
    <h2>1. Basic Link</h2>
    <a href="https://www.google.com">Go to Google</a>

    <!-- 2. Open Link in New Tab -->
    <h2>2. Open in New Tab</h2>
    <a href="https://www.youtube.com" target="_blank">Open YouTube</a>

    <!-- 3. Link to Another Page -->
    <h2>3. Internal Link</h2>
    <a href="about.html">Go to About Page</a>

    <!-- 4. Email Link -->
    <h2>4. Email Link</h2>
    <a href="mailto:example@gmail.com">Send Email</a>

    <!-- 5. Phone Link -->
    <h2>5. Phone Link</h2>
    <a href="tel:1234567890">Call Now</a>

    <!-- 6. Image as Link -->
    <h2>6. Image as Link</h2>
    <a href="https://www.wikipedia.org">
        <img src="https://via.placeholder.com/150" alt="Sample Image">
    </a>

   
    <br><br><br>


</body>
</html>
