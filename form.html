<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
</head>

<body bgcolor="skyblue">

<h2>Registration Form</h2>
<form action="success.html">


<label>First Name:</label>
<input type="text" value="xyz">
<br><br>

<label>Middle Name:</label>
<input type="text" value="pqr">
<br><br>

<label>Last Name:</label>
<input type="text" value="abc">
<br><br>

<label>Gender:</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<label>Address:</label><br>
<textarea name="address" rows="4" cols="30" required></textarea>
<br><br>

<label>Select College:</label>
<select name="college" required>
<option value="">--Select College--</option>
<option value="DY Patil">DY Patil College</option>
<option value="COEP">COEP College</option>
<option value="MIT">MIT College</option>
<option value="VIT">VIT College</option>
<option value="PCCOE">PCCOE College</option>
</select>

<br><br>

<label>Branch Name:</label>
<select name="branch" required>
<option value="">--Select Branch--</option>
<option value="CSE">CSE</option>
<option value="IT">IT</option>
<option value="ENTC">ENTC</option>
<option value="MECH">Mechanical</option>
</select>

<br><br>

<input type="submit" value="Submit">


</form>

</body>
</html>
